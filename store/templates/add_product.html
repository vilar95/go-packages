{{ define "AddProduct" }}
<!DOCTYPE html>
<html lang="pt-br">

{{ template "_head" "Adicionar Produto" }}

<body>
    {{ template "_menu" }}

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="form-container">
                    <div class="form-header">
                        <h1>Nova Peça</h1>
                        <p>Adicionar produto ao catálogo TechWear</p>
                    </div>

                    <form method="POST" action="/insert-product">
                        <div class="row row-custom">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label class="required-field">
                                        <i class="fas fa-tag"></i>Nome do Produto
                                    </label>
                                    <input type="text" name="name" class="form-control"
                                        placeholder="Ex: Camiseta Tech Performance" required>
                                </div>
                            </div>
                        </div>

                        <div class="row row-custom">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label class="required-field">
                                        <i class="fas fa-align-left"></i>Descrição
                                    </label>
                                    <textarea name="description" class="form-control" rows="3"
                                        placeholder="Características técnicas e materiais" required></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="row row-custom">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="required-field">
                                        <i class="fas fa-dollar-sign"></i>Preço (R$)
                                    </label>
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text">R$</span>
                                        </div>
                                        <input type="number" name="price" class="form-control" step="0.01" min="0"
                                            placeholder="0.00" required>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="required-field">
                                        <i class="fas fa-cubes"></i>Quantidade em Estoque
                                    </label>
                                    <input type="number" name="quantity" class="form-control" min="0" placeholder="0"
                                        required>
                                </div>
                            </div>
                        </div>

                        <div class="button-group">
                            <button type="submit" class="btn-submit">
                                <i class="fas fa-check"></i> Salvar
                            </button>
                            <a class="btn-back" href="/">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
{{ end }}
