{{ define "AddProduct" }}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
    <title>Adicionar Produto - TechWear Store</title>
    <style>
        body {
            background: #0a0a0a;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
            padding-bottom: 3rem;
            color: #e0e0e0;
        }

        .navbar {
            background: #000000 !important;
            box-shadow: 0 2px 8px rgba(255, 255, 255, 0.05);
            padding: 1.2rem 2rem;
            border-bottom: 1px solid #1a1a1a;
        }

        .navbar-brand {
            color: #ffffff !important;
            font-size: 1.6rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .navbar-brand:hover {
            color: #808080 !important;
            transition: color 0.3s ease;
        }

        .form-container {
            background: #1a1a1a;
            border-radius: 2px;
            border: 1px solid #2a2a2a;
            padding: 3rem;
            margin-top: 2rem;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #2a2a2a;
        }

        .form-header h1 {
            color: #ffffff;
            font-weight: 300;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        .form-header p {
            color: #808080;
            font-size: 0.95rem;
            font-weight: 300;
        }

        .form-header i {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            font-weight: 400;
            color: #e0e0e0;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group label i {
            margin-right: 0.5rem;
            color: #808080;
        }

        .form-control {
            border: 1px solid #2a2a2a;
            border-radius: 2px;
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #0a0a0a;
            color: #e0e0e0;
        }

        .form-control:focus {
            border-color: #ffffff;
            background: #1a1a1a;
            color: #ffffff;
            box-shadow: none;
            outline: none;
        }

        .form-control::placeholder {
            color: #505050;
        }

        textarea.form-control {
            resize: vertical;
        }

        .input-group-text {
            background: #000000;
            color: #ffffff;
            border: 1px solid #2a2a2a;
            font-weight: 400;
            border-radius: 2px;
        }

        .btn-submit {
            background: #ffffff;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 0.85rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 2px;
            transition: all 0.3s ease;
            color: #000000;
            margin-right: 1rem;
        }

        .btn-submit:hover {
            background: #808080;
            color: #000000;
        }

        .btn-back {
            background: transparent;
            border: 1px solid #ffffff;
            padding: 0.9rem 2rem;
            font-size: 0.85rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 2px;
            transition: all 0.3s ease;
            color: #ffffff;
            text-decoration: none;
        }

        .btn-back:hover {
            background: #ffffff;
            color: #000000;
            text-decoration: none;
        }

        .button-group {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #2a2a2a;
        }

        .row-custom {
            margin-bottom: 1rem;
        }

        .input-icon {
            position: relative;
        }

        .required-field::after {
            content: " *";
            color: #808080;
            font-weight: 400;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <a class="navbar-brand" href="/">
            <i class="fas fa-tshirt"></i> TechWear
        </a>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="form-container">
                    <div class="form-header">
                        <h1>Nova Peça</h1>
                        <p>Adicionar produto ao catálogo TechWear</p>
                    </div>

                    <form method="POST" action="/insert-product">
                        <div class="row row-custom">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label class="required-field">
                                        <i class="fas fa-tag"></i>Nome do Produto
                                    </label>
                                    <input type="text" name="name" class="form-control"
                                        placeholder="Ex: Camiseta Tech Performance" required>
                                </div>
                            </div>
                        </div>

                        <div class="row row-custom">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label class="required-field">
                                        <i class="fas fa-align-left"></i>Descrição
                                    </label>
                                    <textarea name="description" class="form-control" rows="3"
                                        placeholder="Características técnicas e materiais" required></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="row row-custom">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="required-field">
                                        <i class="fas fa-dollar-sign"></i>Preço (R$)
                                    </label>
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text">R$</span>
                                        </div>
                                        <input type="number" name="price" class="form-control" step="0.01" min="0"
                                            placeholder="0.00" required>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="required-field">
                                        <i class="fas fa-cubes"></i>Quantidade em Estoque
                                    </label>
                                    <input type="number" name="quantity" class="form-control" min="0" placeholder="0"
                                        required>
                                </div>
                            </div>
                        </div>

                        <div class="button-group">
                            <button type="submit" class="btn-submit">
                                <i class="fas fa-check"></i> Salvar
                            </button>
                            <a class="btn-back" href="/">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
{{ end }}
